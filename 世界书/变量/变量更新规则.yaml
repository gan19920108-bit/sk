---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check: 随着游戏进行自动更新时间
    当前时空:
      check: 根据玩家选择的历史时空设定
    年号:
      check: 根据当前时空和纪年设置的皇帝年号
    国祚:
      type: number
      range: 0~100
      check: 根据玩家决策和事件影响调整，低于20时国家濒临崩溃
    民心:
      type: number
      range: 0~100
      check: 根据税收、政策、自然灾害、战争等情况调整
    国库:
      type: number
      range: 0~999999
      check: 根据收入、支出、赏赐、贪墨等情况调整
    军事:
      type: number
      range: 0~100
      check: 根据军队训练、装备、将领能力等情况调整
    腐败:
      type: number
      range: 0~100
      check: 根据吏治整顿、战争失败、贪官查处等情况调整

  主角:
    名称:
      check: 玩家设定的角色名称，一般不轻易改变
    身份:
      check: 根据剧情发展可能变化的身份，如藩王、皇帝、太傅等
    称号:
      check: 根据玩家的行为、成就获得的称号
    等级:
      check: 根据经验值积累可能变化的等级/境界
    体力/当前:
      type: number
      range: 0~体力/最大
      check: 根据日常活动、战斗、休息等情况调整
    饱食度/当前:
      type: number
      range: 0~饱食度/最大
      check: 根据进食、饥饿情况调整，归零时体力恢复减半
    能量/当前:
      type: number
      range: 0~能量/最大
      check: 根据使用技能、休息等情况调整
    属性:
      check: 根据升级、任务奖励、事件影响等情况调整各项属性
    天赋:
      check: 玩家选择的天赋，可能在特殊情况下发生变化
    系统模板:
      check: 玩家选择的系统模板，决定可用的系统功能
    金币:
      type: number
      check: 根据交易、赏赐、税收等情况调整

  背包:
    type: "{\"[物品名]\": {\"数量\": number, \"稀有度\": string, ...}}"
    check:
      - 获取、消耗、丢弃物品时更新数量
      - 数量归零后该条目不再显示
      - 装备物品时设置已装备字段

  朝臣:
    type: "{\"[角色ID]\": {\"忠诚度\": number, \"好感\": number, ...}}"
    check:
      - 根据玩家的对待方式调整忠诚度和好感
      - 特殊事件可能改变派系、状态
      - 死亡、流放等事件更新状态字段

  省份:
    type: "{\"[省份ID]\": {\"人口\": number, \"控制度\": number, \"民怨\": number, ...}}"
    check:
      - 根据税收、政策、灾害等情况调整各项数值
      - 控制度归零时省份可能脱离控制

  任务:
    type: "{\"[任务ID]\": {\"进度\": number, \"已完成\": boolean, ...}}"
    check:
      - 根据玩家完成目标的情况更新进度
      - 达成目标时标记为已完成
      - 领取奖励后标记为已领取

  编年史:
    type: "Array<{id, 年份, 章节, 事件文本, 玩家决策, 影响描述, 时间戳}>"
    check:
      - 每个重要决策后新增记录
      - 按时间顺序排列

  世界事件:
    type: "{\"[事件ID]\": {\"严重程度\": string, \"持续回合\": number, ...}}"
    check:
      - 根据事件处理结果决定是否结束
      - 持续回合归零后移除或转为历史记录

  系统:
    签到天数:
      type: number
      check: 每日签到后增加，连续签到有额外奖励
    卡池:
      check: 根据抽卡结果更新已领取状态
    历史记录:
      check: 记录系统相关的操作历史

  游戏进度:
    天数:
      type: number
      check: 每个游戏回合增加1
    剧情日志:
      check: 记录重要的剧情节点和选择
