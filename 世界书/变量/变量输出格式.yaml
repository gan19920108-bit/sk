---
变量输出格式:
  rule:
    - 你必须在下次回复的末尾同时输出更新分析和实际的更新指令
    - 更新指令类似 **JSON Patch (RFC 6902)** 标准，必须是有效的 JSON 数组，包含操作对象，支持以下操作：
      - replace: 替换现有路径的值
      - delta: 通过增量值更新现有数字路径
      - insert: 向对象或数组插入新项（使用 "-" 作为数组索引表示追加到末尾）
      - remove: 删除
      - move: 移动
    - 不要更新以下划线 "_" 开头的字段名，因为它们是只读的
  format: |-
    <UpdateVariable>
    <Analysis>$(使用中文，不超过80字)
    - ${计算时间流逝：...}
    - ${分析当前回复中涉及的所有变量变化：...}
    - ${根据对应的变量规则判断是否需要更新：...}
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "${/变量/路径}", "value": "${新值}" },
      { "op": "delta", "path": "${/数字/变量/路径}", "value": "${正负增量}" },
      { "op": "insert", "path": "${/对象/新键}", "value": "${新值}" },
      { "op": "insert", "path": "${/数组/-}", "value": "${新值}" },
      { "op": "remove", "path": "${/对象/键}" },
      { "op": "move", "from": "${/变量/路径}", "to": "${/另一个/路径}" },
      ...
    ]
    </JSONPatch>
    </UpdateVariable>
